services:
  intel-station:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./assets:/app/assets
      - ./knowledge_base:/app/knowledge_base
      - ./skills:/app/skills
    env_file:
      - .env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
