<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Access Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary-color: #0077ff;
}

body {
  margin: 0;
  background: #05070d;
  color: var(--primary-color);
  font-family: 'Orbitron', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
}

/* Background video */
#bg-video {
  position: fixed;        /* Stay in place */
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);  /* Center it */

  min-width: 100%;
  min-height: 100%;
  width: auto;
  height: auto;
  object-fit: cover;
  z-index: -1;
}

/* Scanline effect */
body::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,255,200,0.03),
    rgba(0,255,200,0.03) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
}

/* Panel wrapper — carries the drop-shadow glow so it works with clip-path */
.panel-wrapper {
  filter:
    drop-shadow(0 0 12px rgba(0, 119, 255, 0.9))
    drop-shadow(0 0 35px rgba(0, 119, 255, 0.4));
  transition: opacity 0.5s ease;
}

.panel-wrapper.hidden {
  opacity: 0;
  pointer-events: none;
}

/* Main panel */
.panel {
  border: 2px solid var(--primary-color);
  padding: 24px;
  background: rgba(0, 12, 22, 0.93);
  width: 320px;
  /* Chamfered (angled) corners */
  clip-path: polygon(
    22px 0%, calc(100% - 22px) 0%,
    100% 22px, 100% calc(100% - 22px),
    calc(100% - 22px) 100%, 22px 100%,
    0% calc(100% - 22px), 0% 22px
  );
}

/* Display */
.display {
  height: 68px;
  border: 1px solid rgba(0, 150, 255, 0.5);
  border-bottom: 1px solid rgba(0, 80, 160, 0.9);
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  letter-spacing: 4px;
  font-size: 17px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  background: linear-gradient(180deg, #000c1a 0%, #000508 100%);
  color: #33ccff;
  text-shadow: 0 0 8px #00aaff, 0 0 20px #0077ff, 0 0 40px rgba(0, 100, 255, 0.4);
  box-shadow:
    inset 0 0 25px rgba(0, 80, 180, 0.2),
    inset 0 2px 0 rgba(0, 80, 160, 0.3),
    0 0 8px rgba(0, 119, 255, 0.3);
  position: relative;
  overflow: hidden;
}

/* Scanlines on the display */
.display::before {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 3px,
    rgba(0, 0, 0, 0.12) 3px, rgba(0, 0, 0, 0.12) 4px
  );
  pointer-events: none;
  z-index: 1;
}

/* Blinking cursor shown while typing */
.display.typing::after {
  content: "_";
  animation: blink 0.8s step-end infinite;
  margin-left: 2px;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* Keypad */
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  background: rgba(0, 5, 15, 0.55);
  padding: 12px;
  box-shadow: inset 0 0 24px rgba(0, 0, 0, 0.7), inset 0 0 4px rgba(0, 119, 255, 0.15);
}

button {
  height: 64px;
  font-size: 20px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  background: linear-gradient(180deg, #001a33 0%, #000d1a 100%);
  border: 2px solid var(--primary-color);
  border-radius: 10px;
  color: #a8d8ff;
  text-shadow: 0 0 8px #4db8ff, 0 0 18px #0077ff;
  cursor: pointer;
  transition: all 0.15s ease;
  box-shadow:
    0 0 8px rgba(0, 119, 255, 0.5),
    inset 0 0 10px rgba(0, 100, 200, 0.2),
    inset 0 1px 0 rgba(100, 180, 255, 0.15);
  letter-spacing: 1px;
}

button:hover {
  background: linear-gradient(180deg, #003366 0%, #001a40 100%);
  color: #ffffff;
  text-shadow: 0 0 10px #ffffff, 0 0 22px #4db8ff;
  box-shadow:
    0 0 16px rgba(0, 119, 255, 0.9),
    0 0 30px rgba(0, 119, 255, 0.4),
    inset 0 0 16px rgba(0, 140, 255, 0.3),
    inset 0 1px 0 rgba(180, 220, 255, 0.25);
  border-color: #4db8ff;
}

button:active {
  background: linear-gradient(180deg, #0055bb 0%, #002266 100%);
  box-shadow:
    0 0 20px rgba(0, 119, 255, 1),
    0 0 40px rgba(0, 119, 255, 0.5),
    inset 0 0 20px rgba(0, 160, 255, 0.4);
  transform: scale(0.96);
}

/* Status states */
.granted {
  color: #00ff00;
  text-shadow: 0 0 10px #00ff00;
}

.denied {
  color: #ff0033;
  text-shadow: 0 0 10px #ff0033;
}

#imf {
  margin-top: -8vh;
  position: relative;
}

#imf-logo-cont {
    display: flex;
    justify-content: center;
    margin-bottom: 30px;
    perspective: 600px;
}

.imf-logo {
    width: 200px;
    animation: spin 9s linear infinite;
}

@keyframes spin {
  /* Hold facing forward */
  0%   { transform: rotateY(0deg); }
  22%  { transform: rotateY(0deg);   animation-timing-function: cubic-bezier(0.4, 0, 1, 0.5); }
  /* Ease in, building speed up to 90° */
  45%  { transform: rotateY(90deg);  animation-timing-function: linear; }
  /* Blast through back (180°) quickly */
  56%  { transform: rotateY(270deg); animation-timing-function: cubic-bezier(0, 0.5, 0.6, 1); }
  /* Ease out, settling back to front */
  72%  { transform: rotateY(360deg); }
  /* Hold facing forward again */
  100% { transform: rotateY(360deg); }
}

/* Shake animation */
@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
  100% { transform: translateX(0); }
}

/* Flicker */
@keyframes flicker {
  0% { opacity: 1; }
  50% { opacity: 0.6; }
  100% { opacity: 1; }
}

.flicker {
  animation: flicker 0.2s infinite;
}

/* Logo scale wrapper for access-granted animation */
#logo-scale-wrapper {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  transform-origin: center center;
}

#logo-scale-wrapper.expanded {
  transform: scale(2) translateY(20%);
}

/* Welcome text — absolutely positioned below the logo within the scale wrapper
   so it moves and scales as one unit with the logo */
#welcome-text {
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  margin-top: 12px;
  white-space: nowrap;
  text-align: center;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  color: #33ccff;
  text-shadow:
    0 0 8px #00aaff,
    0 0 25px #0077ff,
    0 0 55px rgba(0, 100, 255, 0.6);
  opacity: 0;
  transition: opacity 0.6s ease;
  pointer-events: none;
  line-height: 1.5;
}

#welcome-text.visible {
  opacity: 1;
}

#welcome-text .wt-label {
  font-size: 16px;
  letter-spacing: 10px;
  color: #a8d8ff;
  text-shadow: 0 0 6px #4db8ff, 0 0 18px #0077ff;
}

#welcome-text .wt-name {
  font-size: 22px;
  letter-spacing: 6px;
  margin-top: 4px;
}

</style>
</head>

<body>

<video id="bg-video" autoplay muted loop playsinline>
  <source src="assets/videos/circuit-bg-1920.mp4" type="video/mp4">
</video>

<div id="imf">
    <div id="logo-scale-wrapper">
        <div id="imf-logo-cont">
            <img class="imf-logo" src="assets/imf.svg"/>
        </div>
        <div id="welcome-text">
            <div class="wt-label">WELCOME</div>
            <div class="wt-name" id="agent-name-line"></div>
        </div>
    </div>

    <div class="panel-wrapper">
      <div class="panel" id="panel">
        <div class="display" id="display">ENTER CODE</div>
        <div class="keypad" id="keypad"></div>
      </div>
    </div>
</div>

<script>
let input = "";

const display = document.getElementById("display");
const keypad = document.getElementById("keypad");
const panel = document.getElementById("panel");

/* AUDIO */
const beep1 = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
const beep2 = new Audio("assets/sounds/single-keypad-beep.mp3");
const errorSound = new Audio("assets/sounds/access-denied.mp3");

/* BUILD KEYPAD */
[1,2,3,4,5,6,7,8,9,"CLR",0,"OK"].forEach(key => {
  const btn = document.createElement("button");
  btn.textContent = key;
  btn.onclick = () => handleInput(key);
  keypad.appendChild(btn);
});

function handleInput(key) {

  if (key === "1" || key === "3" || key === "5" || key === "7" || key === "9" || key === "0") {
    beep1.currentTime = 0;
    beep1.play();
  }
  else {
    beep2.currentTime = 0;
    beep2.play();
  }
  
  if (key === "CLR") {
    input = "";
    updateDisplay();
    return;
  }

  if (key === "OK") {
    validate();
    return;
  }

  if (input.length < 6) {
    input += key;
    updateDisplay();
  }
}

function setDisplay(text, extraClass) {
  display.className = "display" + (extraClass ? " " + extraClass : "");
  display.textContent = text;
}

function updateDisplay() {
  if (input === "") {
    setDisplay("ENTER CODE");
    display.classList.remove("typing");
  } else {
    setDisplay(input);
    display.classList.add("typing");
  }
}

/* VALIDATION */
async function validate() {
  try {
    const res = await fetch('/api/validate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: input }),
    });
    const data = await res.json();
    if (data.valid) {
      accessGranted(data.agentName, data.soundFile);
    } else {
      accessDenied();
    }
  } catch (err) {
    console.error('Validation error:', err);
    accessDenied();
  }
}

function accessDenied() {
  setDisplay("ACCESS DENIED", "denied");
  panel.style.animation = "shake 0.3s";

  errorSound.play();

  setTimeout(() => {
    panel.style.animation = "";
    input = "";
    setDisplay("TRY AGAIN");
    setTimeout(() => {
      if (input === "") setDisplay("ENTER CODE");
    }, 1500);
  }, 1200);
}

function accessGranted(agentName, soundFile) {
  setDisplay("ACCESS GRANTED", "granted");
  const successSound = new Audio(soundFile);
  successSound.play();

  setTimeout(() => finalSequence(agentName), 1500);
}

/* FINAL ANIMATION */
function finalSequence(agentName) {
  const panelWrapper = document.querySelector('.panel-wrapper');
  const logoWrapper  = document.getElementById('logo-scale-wrapper');
  const welcomeText  = document.getElementById('welcome-text');
  const agentLine    = document.getElementById('agent-name-line');

  agentLine.textContent = agentName ? agentName.toUpperCase() : '';

  // Fade out keypad, expand logo + move down
  panelWrapper.classList.add('hidden');
  logoWrapper.classList.add('expanded');

  // Fade in welcome text shortly after logo starts growing
  setTimeout(() => welcomeText.classList.add('visible'), 350);

  // After holding, reverse everything
  setTimeout(() => {
    welcomeText.classList.remove('visible');

    // Wait for text to fade out, then shrink logo and restore keypad
    setTimeout(() => {
      logoWrapper.classList.remove('expanded');
      input = "";
      setDisplay("ENTER CODE");
      panelWrapper.classList.remove('hidden');
    }, 600);
  }, 5000);
}
</script>

</body>
</html>
